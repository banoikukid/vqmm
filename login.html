<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Khách Hàng - TeaRus</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fbbf24;
            --primary-dark: #f59e0b;
            --background: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .login-container {
            background: var(--surface);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand img {
            width: 60px;
            height: 60px;
            margin-bottom: 0.5rem;
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .brand h1 span {
            color: var(--primary);
        }

        .brand p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 0.3rem;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            cursor: pointer;
            border-radius: 8px;
            color: var(--text-muted);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: var(--primary);
            color: #000;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 1.5rem;
            margin-top: -0.5rem;
        }

        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(251, 191, 36, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(251, 191, 36, 0.4);
        }

        .btn:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            text-align: center;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: block;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        .btn.loading .btn-text {
            display: none;
        }

        .btn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-home">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
            </path>
        </svg>
        Quay lại Trang Chủ
    </a>

    <div class="login-container">
        <div class="brand">
            <img src="logo-searus.jpg" alt="TeaRus Logo"
                style="height: 80px; width: auto; object-fit: contain; margin-bottom: 0.5rem;">
            <h1><span style="color: #0ea5e9;">Tea</span>Rus</h1>
            <p>Đăng nhập để đặt món và tích điểm</p>
        </div>

        <div class="tabs">
            <div class="tab active" id="tabLogin" onclick="switchTab('login')">Đăng Nhập</div>
            <div class="tab" id="tabRegister" onclick="switchTab('register')">Đăng Ký</div>
        </div>

        <!-- Form Đăng Nhập -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="Nhập địa chỉ email của bạn" required>
            </div>
            <div class="input-group">
                <label for="loginPassword">Mật khẩu</label>
                <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required minlength="6">
            </div>

            <div class="forgot-password">
                <a href="#" onclick="handleResetPassword(event)">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn" id="btnLogin">
                <span class="btn-text">Đăng Nhập</span>
                <span class="spinner"></span>
            </button>
        </form>

        <!-- Form Đăng Ký -->
        <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
            <div class="input-group">
                <label for="regName">Họ và Tên</label>
                <input type="text" id="regName" placeholder="VD: Nguyễn Văn A" required>
            </div>
            <div class="input-group">
                <label for="regPhone">Số điện thoại</label>
                <input type="tel" id="regPhone" placeholder="VD: 0912345678" required>
            </div>
            <div class="input-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="Nhập email của bạn" required>
            </div>
            <div class="input-group">
                <label for="regPassword">Mật khẩu (ít nhất 6 ký tự)</label>
                <input type="password" id="regPassword" placeholder="Tạo mật khẩu" required minlength="6">
            </div>

            <button type="submit" class="btn" id="btnRegister">
                <span class="btn-text">Đăng Ký Tài Khoản</span>
                <span class="spinner"></span>
            </button>
        </form>

        <div id="authMessage" class="message"></div>
    </div>

    <!-- Integrate Firebase Logic in external js to keep clean -->
    <script type="module" src="login.js"></script>

    <script>
        // Simple UI switching logic
        function switchTab(mode) {
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const formLogin = document.getElementById('loginForm');
            const formRegister = document.getElementById('registerForm');
            const msgBox = document.getElementById('authMessage');

            msgBox.className = 'message hidden'; // Clear errors on switch

            if (mode === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                formLogin.style.display = 'block';
                formRegister.style.display = 'none';
            } else {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                formRegister.style.display = 'block';
                formLogin.style.display = 'none';
            }
        }
    </script>
</body>

</html>
